<header class="app-header">
  <a class="brand" routerLink="/">SkillMatch AI</a>
  <button
    type="button"
    class="menu-toggle"
    [class.open]="menuOpen"
    [attr.aria-expanded]="menuOpen"
    aria-label="Abrir menú de navegación"
    (click)="toggleMenu()"
  >
    <span></span>
    <span></span>
    <span></span>
  </button>

  <nav class="main-nav" [class.open]="menuOpen" aria-label="Principal">
    @if (authenticated$ | async) {
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">
        <span class="nav-icon home-icon" aria-hidden="true"></span>
        <span>Inicio</span>
      </a>
      <a routerLink="/resumes" routerLinkActive="active" (click)="closeMenu()">
        <span class="nav-icon cv-icon" aria-hidden="true"></span>
        <span>Mi CV</span>
      </a>
      <a routerLink="/jobs" routerLinkActive="active" (click)="closeMenu()">
        <span class="nav-icon jobs-icon" aria-hidden="true"></span>
        <span>Ofertas</span>
      </a>
      <a routerLink="/matching" routerLinkActive="active" (click)="closeMenu()">
        <span class="nav-icon match-icon" aria-hidden="true"></span>
        <span>Matching</span>
      </a>
      <button type="button" class="nav-button" (click)="logout()">Salir</button>
    } @else {
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">
        <span class="nav-icon home-icon" aria-hidden="true"></span>
        <span>Inicio</span>
      </a>
      <a routerLink="/login" routerLinkActive="active" (click)="closeMenu()">
        <span class="nav-icon login-icon" aria-hidden="true"></span>
        <span>Login</span>
      </a>
      <a routerLink="/register" routerLinkActive="active" (click)="closeMenu()">
        <span class="nav-icon register-icon" aria-hidden="true"></span>
        <span>Registro</span>
      </a>
    }
  </nav>
</header>

<main>
  <router-outlet />
</main>
