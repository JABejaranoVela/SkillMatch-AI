<section class="auth-page">
  <form [formGroup]="form" (ngSubmit)="submit()">
    <h1>Establecer nueva contraseña</h1>

    @if (state === 'success') {
      <p role="status">{{ message }}</p>
      <a routerLink="/login">Ir a iniciar sesión</a>
    } @else if (state === 'invalid' || state === 'expired' || state === 'used') {
      <p class="error" role="alert">{{ message }}</p>
      <a routerLink="/forgot-password">Solicitar un nuevo enlace</a>
    } @else {
      <label>
        Nueva contraseña
        <input
          [type]="showNewPassword ? 'text' : 'password'"
          formControlName="newPassword"
          autocomplete="new-password"
        >
        @if (form.controls.newPassword.touched && form.controls.newPassword.invalid) {
          <small class="error">Debe tener entre 10 y 128 caracteres.</small>
        }
      </label>
      <button type="button" (click)="showNewPassword = !showNewPassword">
        {{ showNewPassword ? 'Ocultar contraseña' : 'Mostrar contraseña' }}
      </button>

      <label>
        Confirmar contraseña
        <input
          [type]="showConfirmation ? 'text' : 'password'"
          formControlName="confirmPassword"
          autocomplete="new-password"
        >
        @if (form.controls.confirmPassword.touched && form.controls.confirmPassword.hasError('mismatch')) {
          <small class="error">Las contraseñas no coinciden.</small>
        }
      </label>
      <button type="button" (click)="showConfirmation = !showConfirmation">
        {{ showConfirmation ? 'Ocultar confirmación' : 'Mostrar confirmación' }}
      </button>

      <button type="submit" [disabled]="state === 'sending'">
        {{ state === 'sending' ? 'Actualizando...' : 'Actualizar contraseña' }}
      </button>
      <a routerLink="/login">Volver a iniciar sesión</a>
    }
  </form>
</section>
