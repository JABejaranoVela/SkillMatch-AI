<section class="auth-page">
  <form [formGroup]="form" (ngSubmit)="submit()">
    <h1>Recuperar contraseña</h1>
    <p>Introduce el email asociado a tu cuenta.</p>

    <label>
      Email
      <input type="email" formControlName="email" autocomplete="email">
      @if (form.controls.email.touched && form.controls.email.invalid) {
        <small class="error">Introduce un email válido.</small>
      }
    </label>

    @if (message) {
      <p [class.error]="state === 'error'" role="status">{{ message }}</p>
    }

    <button type="submit" [disabled]="state === 'sending'">
      {{ state === 'sending' ? 'Enviando...' : 'Enviar instrucciones' }}
    </button>
    <a routerLink="/login">Volver a iniciar sesión</a>
  </form>
</section>
