<main class="auth-page">
  <div class="auth-shell">
    <a class="auth-brand" routerLink="/">SkillMatch <strong>AI</strong></a>
    <section class="auth-card" aria-labelledby="forgot-title">
      <header class="auth-heading">
        <h1 id="forgot-title">Recupera tu contraseña</h1>
        <p>Te enviaremos instrucciones si el email está asociado a una cuenta.</p>
      </header>

      <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <div class="form-field">
          <label for="forgot-email">Email</label>
          <input id="forgot-email" type="email" formControlName="email" autocomplete="email"
            [attr.aria-invalid]="form.controls.email.touched && form.controls.email.invalid">
          @if (form.controls.email.touched && form.controls.email.invalid) {
            <p class="field-error">Introduce un email válido.</p>
          }
        </div>
        @if (message) {
          <p class="auth-message" [class.success]="state === 'sent'"
            [class.error]="state === 'error'" [attr.role]="state === 'error' ? 'alert' : 'status'">
            {{ message }}
          </p>
        }
        <button class="primary-button" type="submit" [disabled]="state === 'sending'">
          {{ state === 'sending' ? 'Enviando...' : 'Enviar instrucciones' }}
        </button>
      </form>
      <p class="auth-links"><a routerLink="/login">Volver a iniciar sesión</a></p>
    </section>
  </div>
</main>
