services:
  db:
    image: pgvector/pgvector:pg16
    container_name: skillmatch-db
    environment:
      POSTGRES_DB: skillmatch
      POSTGRES_USER: skillmatch
      POSTGRES_PASSWORD: skillmatch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build:
      context: ./backend
    container_name: skillmatch-backend
    environment:
      DATABASE_URL: postgresql+psycopg://skillmatch:skillmatch@db:5432/skillmatch
      BACKEND_CORS_ORIGINS: '["http://localhost:4200"]'
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SESSION_DAYS: ${SESSION_DAYS:-30}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-skillmatch_session}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4200}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      EMAIL_FROM: ${EMAIL_FROM:-SkillMatch AI <noreply@example.com>}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      SKILL_NER_ENABLED: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./tests:/app/tests
      - ./data:/app/data
      - ./storage:/app/storage
    depends_on:
      - db

  frontend:
    image: node:20-alpine
    container_name: skillmatch-frontend
    working_dir: /app
    command: sh -c "npm install && npm start"
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

volumes:
  postgres_data:
