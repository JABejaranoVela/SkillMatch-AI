services:
  db:
    image: pgvector/pgvector:pg16
    container_name: skillmatch-db
    environment:
      POSTGRES_DB: skillmatch
      POSTGRES_USER: skillmatch
      POSTGRES_PASSWORD: skillmatch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build:
      context: ./backend
    container_name: skillmatch-backend
    environment:
      DATABASE_URL: postgresql+psycopg://skillmatch:skillmatch@db:5432/skillmatch
      BACKEND_CORS_ORIGINS: '["http://localhost:4200"]'
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      SESSION_DAYS: ${SESSION_DAYS:-30}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-skillmatch_session}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4200}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      EMAIL_FROM: ${EMAIL_FROM:-SkillMatch AI <noreply@example.com>}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      BREVO_API_URL: ${BREVO_API_URL:-https://api.brevo.com/v3/smtp/email}
      EMAIL_PAYLOAD_ENCRYPTION_KEY: ${EMAIL_PAYLOAD_ENCRYPTION_KEY:-7NIkUe_WSF1YHO6QkZNmJjj03kT7S6KZETPBeAaT6cQ=}
      EMAIL_WORKER_POLL_SECONDS: ${EMAIL_WORKER_POLL_SECONDS:-2}
      EMAIL_WORKER_BATCH_SIZE: ${EMAIL_WORKER_BATCH_SIZE:-10}
      EMAIL_WORKER_STALE_MINUTES: ${EMAIL_WORKER_STALE_MINUTES:-15}
      EMAIL_HTTP_TIMEOUT_SECONDS: ${EMAIL_HTTP_TIMEOUT_SECONDS:-15}
      PASSWORD_RESET_TTL_MINUTES: ${PASSWORD_RESET_TTL_MINUTES:-60}
      PASSWORD_RESET_MAX_REQUESTS_PER_HOUR: ${PASSWORD_RESET_MAX_REQUESTS_PER_HOUR:-5}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-10}
      EMBEDDINGS_ENABLED: ${EMBEDDINGS_ENABLED:-true}
      EMBEDDINGS_MODEL_NAME: ${EMBEDDINGS_MODEL_NAME:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      SKILL_NER_ENABLED: ${SKILL_NER_ENABLED:-false}
      SKILL_NER_MODEL_NAME: ${SKILL_NER_MODEL_NAME:-urchade/gliner_medium-v2.1}
      TECNOEMPLEO_BASE_URL: ${TECNOEMPLEO_BASE_URL:-https://www.tecnoempleo.com}
      INFOJOBS_API_URL: ${INFOJOBS_API_URL:-https://api.infojobs.net/api/1/offer}
      INFOJOBS_CLIENT_ID: ${INFOJOBS_CLIENT_ID:-}
      INFOJOBS_CLIENT_SECRET: ${INFOJOBS_CLIENT_SECRET:-}
      PROFILE_JOB_IMPORT_LIMIT: ${PROFILE_JOB_IMPORT_LIMIT:-12}
      RECOMMENDATIONS_LIMIT: ${RECOMMENDATIONS_LIMIT:-50}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./tests:/app/tests
      - ./data:/app/data
      - ./storage:/app/storage
    depends_on:
      - db

  email-worker:
    build:
      context: ./backend
    container_name: skillmatch-email-worker
    command: python -m app.workers.email_worker
    environment:
      DATABASE_URL: postgresql+psycopg://skillmatch:skillmatch@db:5432/skillmatch
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      SESSION_DAYS: ${SESSION_DAYS:-30}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-skillmatch_session}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4200}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      EMAIL_FROM: ${EMAIL_FROM:-SkillMatch AI <noreply@example.com>}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      BREVO_API_URL: ${BREVO_API_URL:-https://api.brevo.com/v3/smtp/email}
      EMAIL_PAYLOAD_ENCRYPTION_KEY: ${EMAIL_PAYLOAD_ENCRYPTION_KEY:-7NIkUe_WSF1YHO6QkZNmJjj03kT7S6KZETPBeAaT6cQ=}
      EMAIL_WORKER_POLL_SECONDS: ${EMAIL_WORKER_POLL_SECONDS:-2}
      EMAIL_WORKER_BATCH_SIZE: ${EMAIL_WORKER_BATCH_SIZE:-10}
      EMAIL_WORKER_STALE_MINUTES: ${EMAIL_WORKER_STALE_MINUTES:-15}
      EMAIL_HTTP_TIMEOUT_SECONDS: ${EMAIL_HTTP_TIMEOUT_SECONDS:-15}
      PASSWORD_RESET_TTL_MINUTES: ${PASSWORD_RESET_TTL_MINUTES:-60}
      PASSWORD_RESET_MAX_REQUESTS_PER_HOUR: ${PASSWORD_RESET_MAX_REQUESTS_PER_HOUR:-5}
    volumes:
      - ./backend/app:/app/app
      - ./tests:/app/tests
    depends_on:
      - db
      - backend

  frontend:
    image: node:20-alpine
    container_name: skillmatch-frontend
    working_dir: /app
    command: sh -c "npm install && npm start"
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

volumes:
  postgres_data:
