# Example local production override for a VPS with host Nginx + Certbot.
#
# Copy this file on the server as:
#   docker-compose.prod.override.yml
#
# The real override is intentionally ignored by Git. Adjust paths and ports on
# the VPS only. Do not commit secrets, certificates, or server-specific config.
services:
  db:
    volumes:
      - /srv/data/skillmatch-ai/postgres:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    # !override replaces the base ports list instead of merging it. It requires
    # a modern Docker Compose version (validated on the VPS with v5.2.0).
    ports: !override
      - "127.0.0.1:8001:8000"
    volumes:
      - /srv/data/skillmatch-ai/uploads:/app/storage/resumes

  email-worker:
    volumes:
      - /srv/data/skillmatch-ai/uploads:/app/storage/resumes

  frontend:
    # Prevent the base 80:80 mapping from remaining active next to this binding.
    ports: !override
      - "127.0.0.1:8080:80"
