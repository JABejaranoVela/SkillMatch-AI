name: Validate, build and deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: skillmatch-production
  cancel-in-progress: false

jobs:
  validate-ref:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require main branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Production deployments are only allowed from main." >&2
          exit 1

  backend-tests:
    needs: validate-ref
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: skillmatch
          POSTGRES_USER: skillmatch
          POSTGRES_PASSWORD: skillmatch_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U skillmatch -d skillmatch"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://skillmatch:skillmatch_ci@127.0.0.1:5432/skillmatch
      ENVIRONMENT: test
      EMAIL_PROVIDER: fake
      EMBEDDINGS_ENABLED: "false"
      SKILL_NER_ENABLED: "false"
      PYTHONPATH: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./backend[dev]"

      - name: Apply test database migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run backend tests
        run: python -m pytest -q tests

      - name: Run Ruff
        run: ruff check backend/app tests --config backend/pyproject.toml

      - name: Check Python dependencies
        run: python -m pip check

      - name: Check Alembic alignment
        working-directory: backend
        run: alembic check

  frontend-tests:
    needs: validate-ref
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test:ci

      - name: Build frontend
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  build-and-push:
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image metadata
        shell: bash
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${GITHUB_SHA:0:12}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/skillmatch-ai-backend:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/skillmatch-ai-backend:${{ env.SHORT_SHA }}
            ghcr.io/${{ env.OWNER_LC }}/skillmatch-ai-backend:main
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=backend-production
          cache-to: type=gha,mode=max,scope=backend-production

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/skillmatch-ai-frontend:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/skillmatch-ai-frontend:${{ env.SHORT_SHA }}
            ghcr.io/${{ env.OWNER_LC }}/skillmatch-ai-frontend:main
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=frontend-production
          cache-to: type=gha,mode=max,scope=frontend-production

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DEPLOY_SHA: ${{ github.sha }}
      GITHUB_ACTOR_NAME: ${{ github.actor }}
    steps:
      - name: Validate deployment secrets
        shell: bash
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_KEY"
          test -n "$VPS_KNOWN_HOSTS"

      - name: Configure SSH
        shell: bash
        run: |
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$VPS_SSH_KEY" | tr -d '\r' > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$VPS_KNOWN_HOSTS" | tr -d '\r' > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"

      - name: Prepare image owner
        shell: bash
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR on VPS with ephemeral credentials
        shell: bash
        run: |
          AUTH_DIR="/dev/shm/skillmatch-ghcr-${GITHUB_RUN_ID}"
          ssh -i "$HOME/.ssh/id_ed25519" -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "$VPS_USER@$VPS_HOST" "rm -rf '$AUTH_DIR' && install -d -m 700 '$AUTH_DIR'"
          printf '%s' "$GHCR_TOKEN" | \
            ssh -i "$HOME/.ssh/id_ed25519" -o BatchMode=yes -o StrictHostKeyChecking=yes \
              "$VPS_USER@$VPS_HOST" \
              "docker --config '$AUTH_DIR' login ghcr.io --username '$GITHUB_ACTOR_NAME' --password-stdin"

      - name: Deploy immutable images
        shell: bash
        run: |
          AUTH_DIR="/dev/shm/skillmatch-ghcr-${GITHUB_RUN_ID}"
          ssh -i "$HOME/.ssh/id_ed25519" -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "$VPS_USER@$VPS_HOST" bash -s -- "$DEPLOY_SHA" "$OWNER_LC" "$AUTH_DIR" <<'REMOTE'
          set -Eeuo pipefail
          DEPLOY_SHA="$1"
          OWNER_LC="$2"
          AUTH_DIR="$3"

          cd /srv/apps/skillmatch-ai
          git diff --quiet
          git diff --cached --quiet
          git fetch --prune origin main
          git checkout main
          git merge --ff-only origin/main
          test "$(git rev-parse HEAD)" = "$DEPLOY_SHA"

          DOCKER_CONFIG="$AUTH_DIR" bash scripts/deploy-production.sh "$DEPLOY_SHA" "$OWNER_LC"
          REMOTE

      - name: Remove ephemeral GHCR credentials
        if: always()
        shell: bash
        run: |
          AUTH_DIR="/dev/shm/skillmatch-ghcr-${GITHUB_RUN_ID}"
          ssh -i "$HOME/.ssh/id_ed25519" -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "$VPS_USER@$VPS_HOST" \
            "docker --config '$AUTH_DIR' logout ghcr.io >/dev/null 2>&1 || true; rm -rf '$AUTH_DIR'" \
            || true
